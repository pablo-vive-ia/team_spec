    // ── SECCIÓN: TAREAS ────────────────────────────────────────────────
    const TASK_STATUS_CYCLE = { pendiente:'en_progreso', en_progreso:'completado', completado:'pendiente' };
    const TASK_STATUS_LABEL = { pendiente:'Pendiente', en_progreso:'En progreso', completado:'Completado', cancelado:'Cancelado' };
    const TASK_STATUS_BG    = { pendiente:'rgba(156,163,175,0.15)', en_progreso:'rgba(59,107,247,0.18)', completado:'rgba(34,197,94,0.15)', cancelado:'rgba(107,114,128,0.10)' };
    const TASK_STATUS_FG    = { pendiente:'var(--t2)', en_progreso:'var(--acc)', completado:'var(--success)', cancelado:'var(--t3)' };
    const TASK_PRIO_COLOR   = { baja:'var(--success)', media:'var(--acc)', alta:'var(--warn)', urgente:'var(--danger)' };
    const TASK_PRIO_LABEL   = { baja:'Baja', media:'Media', alta:'Alta', urgente:'Urgente' };
    const TASK_PRIO_ORDER   = { urgente:0, alta:1, media:2, baja:3 };
    const TASK_ST_ORDER     = { pendiente:0, en_progreso:1, completado:2, cancelado:3 };
    const TASK_TEAMS_F      = ['Todos','netTime','SPECManager'];
    const TASK_STATUSES_F   = ['Todos','pendiente','en_progreso','completado','cancelado'];

    function renderTareas() {
      const today = new Date(); today.setHours(0,0,0,0);

      let tasks = D.tasks;
      if (activeTaskStatus !== 'Todos') tasks = tasks.filter(t => t.status === activeTaskStatus);

      tasks = [...tasks].sort((a,b) => {
        if (TASK_ST_ORDER[a.status] !== TASK_ST_ORDER[b.status]) return TASK_ST_ORDER[a.status] - TASK_ST_ORDER[b.status];
        if (a.due_date && b.due_date) return new Date(a.due_date) - new Date(b.due_date);
        if (a.due_date) return -1; if (b.due_date) return 1;
        return (TASK_PRIO_ORDER[a.priority]||2) - (TASK_PRIO_ORDER[b.priority]||2);
      });

      const pendCount    = D.tasks.filter(t => t.status === 'pendiente').length;
      const inProgCount  = D.tasks.filter(t => t.status === 'en_progreso').length;
      const overdueCount = D.tasks.filter(t => t.due_date && !['completado','cancelado'].includes(t.status) && new Date(t.due_date) < today).length;
      const doneCount    = D.tasks.filter(t => t.status === 'completado').length;

      const pillBtn = (label, active, onclick) =>
        `<button onclick="${onclick}" style="padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.03em;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;${active ? 'background:rgba(59,107,247,0.22);color:var(--t1);border-color:rgba(59,107,247,0.32)' : 'background:transparent;color:var(--t3)'}">${label}</button>`;

      return `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <p class="sec-label" style="color:var(--t3);margin:0">TAREAS INTERNAS</p>
          <button onclick="openTaskModal(null)"
            style="padding:8px 18px;border-radius:8px;background:var(--acc);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;letter-spacing:0.04em;transition:opacity 0.15s"
            onmouseover="this.style.opacity='0.82'" onmouseout="this.style.opacity='1'">+ Nueva Tarea</button>
        </div>

        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px">
          ${[
            { label:'Pendientes',  val:pendCount,    icon:svgBlock,  color:'var(--t2)' },
            { label:'En progreso', val:inProgCount,  icon:svgWrench, color:'var(--acc)' },
            { label:'Vencidas',    val:overdueCount, icon:svgAlert,  color:'var(--danger)' },
            { label:'Completadas', val:doneCount,    icon:svgCheck,  color:'var(--success)' },
          ].map(s => `
            <div class="glass" style="border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;min-width:140px">
              <div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,${s.color},transparent)"></div>
              <div style="width:26px;height:26px;border-radius:7px;background:${s.color}22;display:flex;align-items:center;justify-content:center;color:${s.color};flex-shrink:0">${s.icon}</div>
              <div>
                <div style="font-size:20px;font-weight:800;color:var(--t1);line-height:1;letter-spacing:-0.02em">${s.val}</div>
                <div style="font-size:10px;color:var(--t3);margin-top:2px;font-weight:600;letter-spacing:0.04em">${s.label}</div>
              </div>
            </div>
          `).join('')}
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px">
          <div style="display:flex;gap:4px;padding:3px;border-radius:99px;background:var(--row-b);border:1px solid var(--pill-br)">
            ${TASK_STATUSES_F.map(s => pillBtn(s==='Todos'?'Todos':TASK_STATUS_LABEL[s], activeTaskStatus===s, `setTaskStatusFilter('${s}')`)).join('')}
          </div>
        </div>

        ${tasks.length === 0
          ? `<div class="glass" style="border-radius:12px;padding:48px;text-align:center;color:var(--t3);font-size:12px">Sin tareas${activeTaskStatus!=='Todos'?' con los filtros aplicados':''}. Creá una con el botón de arriba.</div>`
          : `<div class="glass" style="border-radius:12px;overflow:hidden">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead><tr style="border-bottom:1px solid var(--b1)">
              ${['TAREA','RESPONSABLE','PRIORIDAD','ESTADO','VENCE',''].map(h =>
                `<th style="padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:0.07em;color:var(--t3)">${h}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${tasks.map((task, idx) => {
                const overdue  = task.due_date && !['completado','cancelado'].includes(task.status) && new Date(task.due_date) < today;
                const done     = task.status === 'completado';
                const rowBg    = overdue ? 'rgba(239,68,68,0.06)' : (idx%2===0 ? 'transparent' : 'var(--row-b)');
                const borderL  = overdue ? 'border-left:3px solid var(--danger);' : '';
                const next     = TASK_STATUS_CYCLE[task.status];
                const dueStr   = task.due_date ? new Date(task.due_date+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
                const prioC    = TASK_PRIO_COLOR[task.priority]||'var(--t3)';
                return `<tr style="border-bottom:1px solid var(--b1);background:${rowBg};${borderL}">
                  <td style="padding:12px 16px;max-width:300px">
                    <div style="font-weight:600;color:${done?'var(--t3)':'var(--t1)'};${done?'text-decoration:line-through':''}">${esc(task.title)}</div>
                    ${task.description?`<div style="font-size:11px;color:var(--t3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:260px">${esc(task.description)}</div>`:''}
                  </td>
                  <td style="padding:12px 16px;color:${task.assignee?'var(--acc)':'var(--t3)'};font-weight:${task.assignee?'600':'400'}">${esc(task.assignee||'—')}</td>
                  <td style="padding:12px 16px">
                    <span style="padding:3px 9px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:0.05em;background:${prioC}22;color:${prioC}">
                      ${TASK_PRIO_LABEL[task.priority]||esc(task.priority)}
                    </span>
                  </td>
                  <td style="padding:12px 16px">
                    ${next
                      ? `<button onclick="cycleTaskStatus('${task.id}','${next}')" title="Click para avanzar"
                          style="padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:0.04em;border:none;cursor:pointer;font-family:inherit;background:${TASK_STATUS_BG[task.status]||'var(--row-b)'};color:${TASK_STATUS_FG[task.status]||'var(--t2)'};transition:opacity 0.15s"
                          onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">
                          ${TASK_STATUS_LABEL[task.status]}
                        </button>`
                      : `<span style="padding:4px 10px;border-radius:99px;font-size:10px;font-weight:700;background:${TASK_STATUS_BG[task.status]||'var(--row-b)'};color:${TASK_STATUS_FG[task.status]||'var(--t3)'}">
                          ${TASK_STATUS_LABEL[task.status]||esc(task.status)}
                        </span>`}
                  </td>
                  <td style="padding:12px 16px;color:${overdue?'var(--danger)':'var(--t2)'};font-weight:${overdue?'600':'400'};white-space:nowrap">
                    ${overdue?'⚠ ':''}${dueStr}
                  </td>
                  <td style="padding:12px 16px;white-space:nowrap;text-align:right">
                    <button onclick="openTaskModal('${task.id}')"
                      style="padding:4px 9px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:inherit;margin-right:4px;transition:all 0.15s"
                      onmouseover="this.style.borderColor='var(--acc)';this.style.color='var(--acc)'" onmouseout="this.style.borderColor='var(--b1)';this.style.color='var(--t2)'">Editar</button>
                    <button onclick="deleteTask('${task.id}')"
                      style="padding:4px 9px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t3);cursor:pointer;font-size:11px;font-family:inherit;transition:all 0.15s"
                      onmouseover="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'" onmouseout="this.style.borderColor='var(--b1)';this.style.color='var(--t3)'">✕</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`}

        <!-- Modal nueva/editar tarea -->
        <div id="task-modal" onclick="if(event.target===this)closeTaskModal()"
          style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px">
          <div class="glass" style="border-radius:16px;padding:32px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()">
            <h3 id="task-modal-title" style="font-size:16px;font-weight:700;color:var(--t1);margin:0 0 24px">Nueva Tarea</h3>
            <input type="hidden" id="task-id-input">
            <div style="display:flex;flex-direction:column;gap:16px">
              <div>
                <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">TÍTULO *</label>
                <input id="task-title-input" type="text" placeholder="Descripción de la tarea…"
                  style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--row-b);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;transition:border-color 0.15s;outline:none"
                  onfocus="this.style.borderColor='rgba(59,107,247,0.5)'" onblur="this.style.borderColor=''">
              </div>
              <div>
                <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">DESCRIPCIÓN</label>
                <textarea id="task-desc-input" placeholder="Detalles adicionales…" rows="3"
                  style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--row-b);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;resize:vertical;outline:none;transition:border-color 0.15s"
                  onfocus="this.style.borderColor='rgba(59,107,247,0.5)'" onblur="this.style.borderColor=''"></textarea>
              </div>
              <div>
                <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">RESPONSABLE</label>
                <input id="task-assignee-input" type="text" placeholder="Nombre…"
                  style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--row-b);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;outline:none;transition:border-color 0.15s"
                  onfocus="this.style.borderColor='rgba(59,107,247,0.5)'" onblur="this.style.borderColor=''">
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
                <div>
                  <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">PRIORIDAD</label>
                  <select id="task-prio-input" style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--s1);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;outline:none">
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                    <option value="urgente">Urgente</option>
                  </select>
                </div>
                <div>
                  <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">ESTADO</label>
                  <select id="task-status-input" style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--s1);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;outline:none">
                    <option value="pendiente">Pendiente</option>
                    <option value="en_progreso">En progreso</option>
                    <option value="completado">Completado</option>
                    <option value="cancelado">Cancelado</option>
                  </select>
                </div>
                <div>
                  <label style="display:block;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:0.08em;margin-bottom:6px">VENCE</label>
                  <input id="task-due-input" type="date"
                    style="width:100%;border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t1);background:var(--s1);border:1px solid var(--b1);font-family:inherit;box-sizing:border-box;outline:none;transition:border-color 0.15s"
                    onfocus="this.style.borderColor='rgba(59,107,247,0.5)'" onblur="this.style.borderColor=''">
                </div>
              </div>
            </div>
            <div id="task-modal-error" style="display:none;margin-top:12px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,0.12);color:#FCA5A5;font-size:12px"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:24px">
              <button onclick="closeTaskModal()"
                style="padding:9px 20px;border-radius:8px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all 0.15s">
                Cancelar
              </button>
              <button id="task-submit-btn" onclick="submitTask()"
                style="padding:9px 20px;border-radius:8px;border:none;background:var(--acc);color:#fff;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:opacity 0.15s">
                Guardar
              </button>
            </div>
          </div>
        </div>
      `;
    }

    window.openTaskModal = function(id) {
      const modal = document.getElementById('task-modal');
      if (!modal) return;
      const isEdit = !!id;
      document.getElementById('task-modal-title').textContent = isEdit ? 'Editar Tarea' : 'Nueva Tarea';
      document.getElementById('task-id-input').value = id || '';
      document.getElementById('task-modal-error').style.display = 'none';
      if (isEdit) {
        const task = D.tasks.find(t => t.id === id);
        if (task) {
          document.getElementById('task-title-input').value    = task.title || '';
          document.getElementById('task-desc-input').value     = task.description || '';
          document.getElementById('task-assignee-input').value = task.assignee || '';
          document.getElementById('task-prio-input').value     = task.priority || 'media';
          document.getElementById('task-status-input').value   = task.status || 'pendiente';
          document.getElementById('task-due-input').value      = task.due_date || '';
        }
      } else {
        document.getElementById('task-title-input').value    = '';
        document.getElementById('task-desc-input').value     = '';
        document.getElementById('task-assignee-input').value = '';
        document.getElementById('task-prio-input').value     = 'media';
        document.getElementById('task-status-input').value   = 'pendiente';
        document.getElementById('task-due-input').value      = '';
      }
      modal.style.display = 'flex';
      setTimeout(() => document.getElementById('task-title-input')?.focus(), 60);
    };

    window.closeTaskModal = function() {
      const modal = document.getElementById('task-modal');
      if (modal) modal.style.display = 'none';
    };

    window.submitTask = async function() {
      const title = document.getElementById('task-title-input').value.trim();
      const errEl = document.getElementById('task-modal-error');
      if (!title) {
        errEl.textContent = 'El título es obligatorio.';
        errEl.style.display = 'block';
        return;
      }
      errEl.style.display = 'none';
      const id  = document.getElementById('task-id-input').value;
      const btn = document.getElementById('task-submit-btn');
      btn.textContent = 'Guardando…'; btn.disabled = true;

      const payload = {
        title,
        description: document.getElementById('task-desc-input').value.trim() || null,
        assignee:    document.getElementById('task-assignee-input').value.trim() || null,
        priority:    document.getElementById('task-prio-input').value,
        status:      document.getElementById('task-status-input').value,
        due_date:    document.getElementById('task-due-input').value || null,
        updated_at:  new Date().toISOString(),
      };

      const result = id
        ? await sb.from('tasks').update(payload).eq('id', id)
        : await sb.from('tasks').insert(payload);

      if (result.error) {
        errEl.textContent = result.error.message;
        errEl.style.display = 'block';
        btn.textContent = 'Guardar'; btn.disabled = false;
        return;
      }
      closeTaskModal();
      await loadAll();
    };

    window.cycleTaskStatus = async function(id, nextStatus) {
      await sb.from('tasks').update({ status: nextStatus, updated_at: new Date().toISOString() }).eq('id', id);
      await loadAll();
    };

    window.deleteTask = async function(id) {
      if (!confirm('¿Eliminar esta tarea?')) return;
      await sb.from('tasks').delete().eq('id', id);
      await loadAll();
    };

    window.setTaskStatusFilter = function(s) { activeTaskStatus = s; render(); };
    window.setTaskTeamFilter   = function(t) { activeTaskTeam   = t; render(); };

    // ── SECCIÓN: ACTIVIDADES EQUIPO ─────────────────────────────────────
    const ACT_PERIODS = [
      {id:'hoy',label:'Hoy'},{id:'semana',label:'Esta semana'},{id:'mes',label:'Este mes'},
      {id:'mes_ant',label:'Mes anterior'},{id:'3m',label:'3 meses'},{id:'6m',label:'6 meses'},
      {id:'anio',label:'Este año'},{id:'todo',label:'Todo'},
    ];
    function actPeriodStart(p) {
      const n=new Date();
      if(p==='hoy')    return new Date(n.getFullYear(),n.getMonth(),n.getDate());
      if(p==='semana') { const d=new Date(n); d.setDate(d.getDate()-((d.getDay()+6)%7)); d.setHours(0,0,0,0); return d; }
      if(p==='mes')    return new Date(n.getFullYear(),n.getMonth(),1);
      if(p==='mes_ant')return new Date(n.getFullYear(),n.getMonth()-1,1);
      if(p==='3m')     return new Date(n.getFullYear(),n.getMonth()-3,1);
      if(p==='6m')     return new Date(n.getFullYear(),n.getMonth()-6,1);
      if(p==='anio')   return new Date(n.getFullYear(),0,1);
      return null; // 'todo'
    }
    function actPeriodEnd(p) {
      if(p==='mes_ant'){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),0,23,59,59);}
      return null;
    }

    // Colores por categoría: orden fijo asignado por horas totales del dataset
    // completo (no filtrado) — así el color de una categoría nunca cambia al
    // aplicar filtros, solo depende de su volumen global. Más allá de las
    // primeras 6 categorías, todas comparten el gris neutro "Otros".
    const ACT_COLORS = ['var(--acc)','var(--acc2)','var(--acc3)','var(--success)','var(--warn)','var(--danger)'];
    const ACT_OTHER_COLOR = 'var(--t3)';
    function buildActivityColorMap(allActivities) {
      const totals = {};
      for (const a of allActivities) {
        const key = a.activity || 'N/A';
        totals[key] = (totals[key]||0) + (Number(a.hours)||0);
      }
      const ranked = Object.keys(totals).sort((x,y) => totals[y]-totals[x]);
      const map = {};
      ranked.forEach((cat, idx) => { map[cat] = idx < ACT_COLORS.length ? ACT_COLORS[idx] : ACT_OTHER_COLOR; });
      return map;
    }

    function fmtHours(h) {
      const totalMin = Math.round((h||0) * 60);
      const hh = Math.floor(totalMin/60), mm = totalMin % 60;
      return `${hh}:${String(mm).padStart(2,'0')}`;
    }

    function categoryBadge(cat, color) {
      return `<span style="display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:0.03em;background:${color}22;border:1px solid ${color}44;color:${color}">
        <span style="width:6px;height:6px;border-radius:50%;background:${color};flex-shrink:0"></span>${esc(cat)}
      </span>`;
    }

    function renderActividadesEquipo() {
      if (!D.activities.length) return `${sh('ACTIVIDADES EQUIPO')}${empty('actividades')}`;

      const colorMap = buildActivityColorMap(D.activities);

      const ps = actPeriodStart(activeActPeriod), pe = actPeriodEnd(activeActPeriod);
      let byPeriod = D.activities;
      if (ps) byPeriod = byPeriod.filter(a => a.log_date && new Date(a.log_date+'T00:00:00') >= ps);
      if (pe) byPeriod = byPeriod.filter(a => a.log_date && new Date(a.log_date+'T00:00:00') <= pe);

      const allUsers = ['Todos', ...new Set(byPeriod.map(a => a.user_name).filter(Boolean))].sort();
      const allCats  = ['Todos', ...new Set(byPeriod.map(a => a.activity).filter(Boolean))].sort();

      let filtered = byPeriod;
      if (activeActUser !== 'Todos')     filtered = filtered.filter(a => a.user_name === activeActUser);
      if (activeActCategory !== 'Todos') filtered = filtered.filter(a => a.activity === activeActCategory);

      window._actividadesExportData = filtered;

      const totalHours  = filtered.reduce((s,a) => s + (Number(a.hours)||0), 0);
      const uniqueUsers = new Set(filtered.map(a => a.user_name).filter(Boolean)).size;

      const catMap = {};
      for (const a of filtered) {
        const key = a.activity || 'N/A';
        if (!catMap[key]) catMap[key] = { activity: key, hours: 0, count: 0 };
        catMap[key].hours += Number(a.hours)||0;
        catMap[key].count++;
      }
      const catRows = Object.values(catMap).sort((x,y) => y.hours - x.hours);
      const topCat  = catRows[0];

      const userMap = {};
      for (const a of filtered) {
        const key = a.user_name || 'Sin asignar';
        if (!userMap[key]) userMap[key] = { user: key, hours: 0, count: 0, cats: {} };
        userMap[key].hours += Number(a.hours)||0;
        userMap[key].count++;
        const c = a.activity || 'N/A';
        userMap[key].cats[c] = (userMap[key].cats[c]||0) + 1;
      }
      const userRows = Object.values(userMap).map(u => {
        const topUserCat = Object.entries(u.cats).sort((x,y) => y[1]-x[1])[0];
        return { ...u, topCat: topUserCat ? topUserCat[0] : '—' };
      }).sort((x,y) => y.hours - x.hours);

      const pillBtn = (label, active, onclick) =>
        `<button onclick="${onclick}" style="padding:5px 12px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:0.03em;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s;${active ? 'background:rgba(59,107,247,0.22);color:var(--t1);border-color:rgba(59,107,247,0.32)' : 'background:transparent;color:var(--t3)'}">${label}</button>`;

      return `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
          <p class="sec-label" style="color:var(--t3);margin:0">ACTIVIDADES EQUIPO</p>
          <div style="display:flex;gap:6px">
            <button onclick="exportActividadesCSV()" title="Exportar a CSV / Excel" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;border:1px solid rgba(16,185,129,0.3);background:rgba(16,185,129,0.08);color:#6EE7B7;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(16,185,129,0.18)'" onmouseout="this.style.background='rgba(16,185,129,0.08)'">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              CSV
            </button>
            <button onclick="exportActividadesPDF()" title="Exportar a PDF / Imprimir" style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.08);color:#FCA5A5;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s" onmouseover="this.style.background='rgba(239,68,68,0.18)'" onmouseout="this.style.background='rgba(239,68,68,0.08)'">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
              PDF
            </button>
          </div>
        </div>

        <div class="sticky-bar">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <div style="display:flex;gap:3px;padding:3px;border-radius:99px;background:var(--row-b);border:1px solid var(--pill-br)">
              ${ACT_PERIODS.map(p => pillBtn(p.label, activeActPeriod===p.id, `setActPeriod('${p.id}')`)).join('')}
            </div>
            <select onchange="setActUser(this.value)" style="padding:5px 10px;border-radius:8px;font-size:11px;border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-family:inherit">
              ${allUsers.map(u => `<option value="${esc(u)}" ${activeActUser===u?'selected':''}>${u==='Todos'?'Todos los técnicos':esc(u)}</option>`).join('')}
            </select>
            <select onchange="setActCategory(this.value)" style="padding:5px 10px;border-radius:8px;font-size:11px;border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-family:inherit">
              ${allCats.map(c => `<option value="${esc(c)}" ${activeActCategory===c?'selected':''}>${c==='Todos'?'Todas las categorías':esc(c)}</option>`).join('')}
            </select>
            <span style="font-size:11px;color:var(--t3)">${filtered.length} registros</span>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:14px;margin-bottom:24px">
          ${kpi('Horas totales',    fmtHours(totalHours), svgClock, 'var(--acc)')}
          ${kpi('Registros',       filtered.length,      svgList,  'var(--acc2)')}
          ${kpi('Técnicos activos',uniqueUsers,          svgUser,  'var(--acc3)')}
          ${kpi('Categoría top',   topCat ? topCat.activity : '—', svgChart, 'var(--success)')}
        </div>

        ${filtered.length === 0 ? empty('actividades') : `
        <div class="glass" style="border-radius:14px;padding:20px;margin-bottom:24px">
          <p class="sec-label" style="color:var(--t3);margin-bottom:16px">HORAS POR CATEGORÍA</p>
          <div style="display:flex;flex-direction:column;gap:10px">
            ${catRows.map(r => {
              const color = colorMap[r.activity] || ACT_OTHER_COLOR;
              const pct = totalHours > 0 ? Math.round((r.hours/totalHours)*100) : 0;
              return `
              <div style="display:flex;align-items:center;gap:12px">
                <div style="width:150px;flex-shrink:0;font-size:12px;color:var(--t2);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.activity)}">${esc(r.activity)}</div>
                <div style="flex:1;height:16px;background:var(--card-b);border-radius:8px;overflow:hidden;position:relative">
                  <div style="height:100%;width:${pct}%;background:${color};border-radius:8px;transition:width 0.5s ease"></div>
                </div>
                <div style="width:110px;flex-shrink:0;text-align:right;font-size:11px;color:var(--t3);font-family:var(--font-mono)">${fmtHours(r.hours)} · ${pct}%</div>
              </div>`;
            }).join('')}
          </div>
        </div>

        <div class="glass" style="border-radius:14px;overflow:hidden;margin-bottom:24px">
          <p class="sec-label" style="color:var(--t3);margin:16px 0 0 20px">POR TÉCNICO</p>
          <table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:12px">
            <thead><tr style="border-bottom:1px solid var(--b1)">
              ${['TÉCNICO','HORAS','REGISTROS','CATEGORÍA MÁS FRECUENTE'].map(h =>
                `<th style="padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:0.07em;color:var(--t3)">${h}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${userRows.map((u,idx) => `
                <tr style="border-bottom:1px solid var(--row-b);background:${idx%2===0?'transparent':'var(--row-b)'}">
                  <td style="padding:11px 16px;color:var(--t1);font-weight:600">${esc(u.user)}</td>
                  <td style="padding:11px 16px;color:var(--t2);font-family:var(--font-mono)">${fmtHours(u.hours)}</td>
                  <td style="padding:11px 16px;color:var(--t2)">${u.count}</td>
                  <td style="padding:11px 16px">${categoryBadge(u.topCat, colorMap[u.topCat]||ACT_OTHER_COLOR)}</td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="glass" style="border-radius:14px;overflow:hidden">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead><tr style="border-bottom:1px solid var(--b1)">
              ${['FECHA','TÉCNICO','CATEGORÍA','HORAS','NOTAS'].map(h =>
                `<th style="padding:10px 16px;text-align:left;font-size:10px;font-weight:600;letter-spacing:0.07em;color:var(--t3)">${h}</th>`).join('')}
            </tr></thead>
            <tbody>
              ${[...filtered].sort((x,y) => new Date(y.log_date)-new Date(x.log_date)).slice(0,300).map((a,idx) => `
                <tr style="border-bottom:1px solid var(--row-b);background:${idx%2===0?'transparent':'var(--row-b)'}">
                  <td style="padding:11px 16px;color:var(--t2);white-space:nowrap">${a.log_date ? new Date(a.log_date+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—'}</td>
                  <td style="padding:11px 16px;color:var(--t1);font-weight:600">${esc(a.user_name||'—')}</td>
                  <td style="padding:11px 16px">${categoryBadge(a.activity||'N/A', colorMap[a.activity||'N/A']||ACT_OTHER_COLOR)}</td>
                  <td style="padding:11px 16px;color:var(--t2);font-family:var(--font-mono)">${fmtHours(a.hours)}</td>
                  <td style="padding:11px 16px;color:var(--t3);max-width:260px"><span style="display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden">${esc(a.notes)||'—'}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
          ${filtered.length > 300 ? `<div style="padding:12px 16px;text-align:center;color:var(--t3);font-size:11px">Mostrando los 300 registros más recientes de ${filtered.length}</div>` : ''}
        </div>
        `}
      `;
    }

    window.setActPeriod   = function(p) { activeActPeriod = p; render(); };
    window.setActUser     = function(v) { activeActUser = v; render(); };
    window.setActCategory = function(v) { activeActCategory = v; render(); };

    window.exportActividadesCSV = function() {
      const data = window._actividadesExportData || [];
      const headers = ['Fecha','Técnico','Categoría','Horas','Notas'];
      const rows = data.map(act => [
        act.log_date || '',
        act.user_name || '',
        act.activity || '',
        fmtHours(act.hours),
        act.notes || ''
      ]);
      const csv = [headers, ...rows]
        .map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
        .join('\n');
      const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `actividades_equipo_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    };

    window.exportActividadesPDF = function() {
      const data = window._actividadesExportData || [];
      const escP = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const rows = [...data].sort((x,y) => new Date(y.log_date)-new Date(x.log_date)).map(a => `<tr>
        <td>${escP(a.log_date)}</td>
        <td>${escP(a.user_name)}</td>
        <td>${escP(a.activity)}</td>
        <td style="text-align:center">${escP(fmtHours(a.hours))}</td>
        <td>${escP(a.notes)}</td>
      </tr>`).join('');
      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html lang="es"><head>
        <meta charset="UTF-8">
        <title>Actividades Equipo Grupo SPEC — ${new Date().toLocaleDateString('es-AR')}</title>
        <style>
          body{font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#111;margin:20px}
          h2{font-size:15px;margin-bottom:3px}
          p.meta{font-size:10px;color:#666;margin-bottom:14px}
          table{width:100%;border-collapse:collapse;table-layout:fixed}
          th{background:#1e2235;color:#fff;padding:6px 8px;text-align:left;font-size:10px;letter-spacing:0.05em;font-weight:700}
          td{padding:5px 7px;border-bottom:1px solid #e5e7eb;vertical-align:top;word-break:break-word}
          tr:nth-child(even) td{background:#f9fafb}
          @page{margin:15mm}
          @media print{body{margin:0}}
        </style>
      </head><body>
        <h2>Actividades Equipo — Grupo SPEC</h2>
        <p class="meta">Exportado: ${new Date().toLocaleString('es-AR')} &nbsp;·&nbsp; ${data.length} registro${data.length!==1?'s':''}</p>
        <table>
          <colgroup>
            <col style="width:14%"><col style="width:20%"><col style="width:22%">
            <col style="width:12%"><col style="width:32%">
          </colgroup>
          <thead><tr><th>Fecha</th><th>Técnico</th><th>Categoría</th><th>Horas</th><th>Notas</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <script>window.onload=()=>window.print();<\/script>
      </body></html>`);
      win.document.close();
    };

    // ── BOOTSTRAP ──────────────────────────────────────────────────────
    if (localStorage.getItem('spec-theme') === 'light') {
      isLightMode = true;
      document.body.classList.add('light');
    }
    updateNavTabs();
    updateThemeBtn();
    buildInstModal();
    await loadAll(true);
    subscribeRealtime();
  </script>
</body>
</html>
